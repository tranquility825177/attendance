<!DOCTYPE html>
<html>
<head>
    <title>DITEC Attendance System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 450px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .2);
            text-align: center;
        }

        h1 {
            color: #0b57d0;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #0b57d0;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            transition: .3s;
        }

        .btn:hover {
            background: #0847a6;
        }

        .footer {
            margin-top: 20px;
            color: #888;
            font-size: 13px;
        }
    </style>
</head>

<body>

    {% with messages = get_flashed_messages() %}
    {% if messages %}

    <script>alert("{{ messages[0] }}");</script>

    {% endif %}
    {% endwith %}

    <div class="container">

        <h1>DITEC Assam</h1>

        <p>Smart Attendance Management System</p>
        <a class="btn" href="/register">Officer Registration</a>
        <a class="btn" href="/officer">Officer Login</a>
        <a class="btn" href="/admin">Admin Login</a>

        <div class="footer">
            Department of Information Technology,
            Electronics & Communication (DITEC)
        </div>
    </div>
</body>
</html>
