<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #dbeafe, #eef4ff);
        }

        .container {
            width: 450px;
            background: #fff;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, .15);
        }

        .logo {
            text-align: center;
            margin-bottom: 10px;
        }

        .logo h1 {
            color: #0b57d0;
            font-size: 34px;
        }

        .logo p {
            color: #666;
            margin-top: 5px;
            font-size: 15px;
        }

        hr {
            margin: 18px 0 25px;
            border: none;
            border-top: 1px solid #ddd;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #222;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }

        .input-group input {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: .3s;
        }

        .input-group input:focus {
            border-color: #0b57d0;
            box-shadow: 0 0 10px rgba(11, 87, 208, .2);
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, #0b57d0, #2563eb);
            color: white;
            font-size: 17px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, .35);
        }

        .bottom {
            text-align: center;
            margin-top: 22px;
            font-size: 15px;
        }

        .bottom a {
            color: #0b57d0;
            text-decoration: none;
            font-weight: 600;
        }

        .bottom a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo">
            <h1>DITEC Assam</h1>
            <p>Smart Attendance Management System</p>
        </div>
        <hr>
        <h2>Officer Login</h2>

        <form method="POST">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <div class="bottom">New Officer?
            <a href="/register">Register Here</a>
            <br><br>
            <a href="/">⬅ Back to Home</a>
        </div>

    </div>
</body>
</html>
